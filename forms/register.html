    .grid-2 {

    function switchForm(role) {
      document.getElementById("studentForm").style.display = (role === 'student') ? "block" : "none";
      document.getElementById("facultyForm").style.display = (role === 'faculty') ? "block" : "none";
      document.getElementById("studentBtn").classList.toggle("active", role === 'student');
      document.getElementById("facultyBtn").classList.toggle("active", role === 'faculty');
    }

  <script>
$(function () {

  function showError(id, msg) { $("#" + id + "Error").text(msg); }
  function clearError(id) { $("#" + id + "Error").text(''); }
  
  // === Duplicate check function ===
  function checkDuplicate(type, field, value, errorId) {
    if (value.trim() === "") return;
    $.post("check-duplicate.php", { type, field, value }, function (res) {
      if (res.status === "duplicate") {
        showError(errorId, field.charAt(0).toUpperCase() + field.slice(1) + " already exists");
      } else {
        clearError(errorId);
      }
    }, "json");
  }

  // === Student form duplicate checks ===
  $("#studentEmail").on("blur", function () {
    checkDuplicate("student", "email", this.value, "studentEmail");
  });
  $("#studentAadhaar").on("blur", function () {
    checkDuplicate("student", "aadhaar", this.value, "studentAadhaar");
  });

  // === Student form submit ===
  $("#studentForm").on("submit", function (e) {
    e.preventDefault();

    let email = $("#studentEmail").val();
    let aadhaar = $("#studentAadhaar").val();
    let phone = $("#studentPhone").val();
    let ok = true;

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError("studentEmail", "Invalid email"); ok = false; }
    if (!/^\d{12}$/.test(aadhaar)) { showError("studentAadhaar", "Enter 12-digit Aadhaar"); ok = false; }
    if (!/^\d{10}$/.test(phone)) { showError("studentPhone", "Enter 10-digit phone"); ok = false; }

    if ($("#studentEmailError").text() !== "" || $("#studentAadhaarError").text() !== "") {
      ok = false;
    }
    if (!ok) return;

    let formData = new FormData(this);

    $.ajax({
      url: "student-register.php",
      type: "POST",
      data: formData,
      contentType: false,
      processData: false,
      success: function (res) {
        let response = (typeof res === "string") ? JSON.parse(res) : res;

        if (response.status === "success") {
          $("body > *:not(#successOverlay)").addClass("blurred");
          $("#successOverlay").css("display","flex").hide().fadeIn();

          setTimeout(function () { window.location.href = "../home.php"; }, 3000);
        } else {
          if (response.field === "email") {
            $("#studentEmailError").text(response.message);
          } else if (response.field === "aadhaar") {
            $("#studentAadhaarError").text(response.message);
          } else {
            $("#messageBox").html(
              '<div style="padding:15px; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; border-radius:5px;">' +
              "❌ " + response.message +
              "</div>"
            );
          }
        }
      },
      error: function () {
        alert("❌ Server error during student registration.");
      }
    });
  });

  // === Faculty form duplicate checks ===
  $("#facultyEmail").on("blur", function () {
    checkDuplicate("faculty", "email", this.value, "facultyEmail");
  });
  $("#facultyAadhaar").on("blur", function () {
    if (this.value.trim() !== "") {
      checkDuplicate("faculty", "aadhaar", this.value, "facultyAadhaar");
    }
  });

  // === Faculty form submit ===
  $("#facultyForm").on("submit", function (e) {
    e.preventDefault();

    let email = $("#facultyEmail").val();
    let aadhaar = $("#facultyAadhaar").val();
    let phone = $("#facultyPhone").val();
    let pan = $("#facultyPan").val();
    let ok = true;

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError("facultyEmail", "Invalid email"); ok = false; }
    if (!/^\d{12}$/.test(aadhaar)) { showError("facultyAadhaar", "Enter 12-digit Aadhaar"); ok = false; }
    if (!/^\d{10}$/.test(phone)) { showError("facultyPhone", "Enter 10-digit phone"); ok = false; }
    if (!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan)) { showError("facultyPan", "Invalid PAN"); ok = false; }

    if ($("#facultyEmailError").text() !== "" || $("#facultyAadhaarError").text() !== "") {
      ok = false;
    }
    if (!ok) return;

    let formData = new FormData(this);

    $.ajax({
      url: "faculty-register.php",
      type: "POST",
      data: formData,
      contentType: false,
      processData: false,
      success: function (res) {
        let response = (typeof res === "string") ? JSON.parse(res) : res;

        if (response.status === "success") {
          $("body > *:not(#successOverlay)").addClass("blurred");
          $("#successOverlay").css("display","flex").hide().fadeIn();

          setTimeout(function () { window.location.href = "../home.php"; }, 3000);
        } else {
          if (response.field === "email") {
            $("#facultyEmailError").text(response.message);
          } else if (response.field === "aadhaar") {
            $("#facultyAadhaarError").text(response.message);
          } else {
            $("#messageBox").html(
              '<div style="padding:15px; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; border-radius:5px;">' +
              "❌ " + response.message +
              "</div>"
            );
          }
        }
      },
      error: function () {
        alert("❌ Server error during faculty registration.");
      }
    });
  });

});
