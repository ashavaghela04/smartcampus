<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Campus Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --primary: #0A4F8A;
      --primary-dark: #07315b;
      --accent: #F5C518;
      --accent-dark: #e7b600;
      --glass-bg: rgba(255,255,255,0.17);
      --border: rgba(10, 79, 138, 0.13);
      --input-bg: rgba(255,255,255,0.46);
    }

    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, var(--primary) 0%, #eaeef7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      width: 900px;
      max-width: 98vw;
      min-height: 550px;
      border-radius: 23px;
      overflow: hidden;
      background: var(--glass-bg);
      box-shadow: 0 10px 36px 3px rgba(10, 79, 138, 0.11);
      backdrop-filter: blur(25px);
      border: 1.5px solid var(--border);
      margin: 25px auto;
    }

    /* LEFT SIDE - only logo */
    .left-side {
      flex: 1.4;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .left-side img {
      max-width: 180px;
      height: auto;
    }

    /* RIGHT SIDE - white form */
    .right-side {
      flex: 2;
      padding: 50px 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: white;
    }

    .right-side h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 24px;
      font-weight: 600;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }
    .form-group input {
      width: 100%;
      padding: 14px 15px 14px 48px;
      border: 1.5px solid #dce6fb;
      border-radius: 9px;
      font-size: 1.05rem;
      background: var(--input-bg);
      color: #22324a;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--primary);
      background: #f2f7fd;
    }
    .form-group .input-icon {
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      font-size: 1.13rem;
      color: var(--primary);
      opacity: 0.81;
    }

    .forgot {
      text-align: right;
      margin-bottom: 26px;
      margin-top: -12px;
    }
    .forgot a {
      color: var(--primary);
      font-size: 0.97rem;
      text-decoration: none;
    }
    .forgot a:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 15px;
      font-size: 1.12rem;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 2px;
    }
    .btn-login:hover {
      background: var(--primary-dark);
    }

    /* Register text under login */
    .register-text {
      text-align: center;
      margin-top: 20px;
      font-size: 0.95rem;
      color: #333;
    }
    .register-text a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
    .register-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        width: 95vw;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LEFT SIDE with logo -->
    <div class="left-side">
      <img src="assets/img/logo123.png" alt="College Logo">
    </div>

    <!-- RIGHT SIDE with login form -->
    <div class="right-side">
      <h2>Login</h2>
      <form method="POST" id="loginForm" novalidate>
        <div class="form-group">
          <span class="input-icon"><i class="fa-solid fa-id-card"></i></span>
          <input type="text" id="enrollment_number" name="enrollment" placeholder="Enrollment Number" required />
        </div>
        <div class="form-group">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="password" name="password" placeholder="Password" required />
        </div>
        <div class="forgot">
          <a href="forgot-password.php">Forgot Password?</a>
        </div>
        <button class="btn-login" type="submit">Login</button>
      </form>

      <div class="register-text">
        Don't have an account? <a href="forms/register.html">Register now</a>
      </div>
      <div id="errorBox" class="error" style="color:red"></div>
    </div>
  </div>
   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
  const errorBox = $('#errorBox');

  function togglePassword(){
   // const pass = $('#password');
    const btn = $('.toggle-pass');
    if (pass.attr('type') === 'password') {
      pass.attr('type','text');
      btn.text('Hide');
    } else {
      pass.attr('type','password');
      btn.text('Show');
    }
  }

  $('#loginForm').on('submit', function(e){
    e.preventDefault();
    errorBox.hide().text('');

    const enrollment = $('#enrollment_number').val().trim();
    const password = $('#password').val().trim();
    if (!enrollment || !password) {
      showError('Please fill in both fields.');
      return;
    }

    // Optional format hint (not required)
    // if (!/^SC\d{5}$/.test(enrollment)) {
    //   showError('Enrollment number format looks off.');
    //   return;
    // }

    const formData = new FormData();
    formData.append('enrollment_number', enrollment);
    formData.append('password', password);

    $.ajax({
      url: 'login1.php',
      method: 'POST',
      data: formData,
      processData: false,
      contentType: false,
      xhrFields: { withCredentials: true },
      success: function(response, textStatus, jqXHR) {
        // If login.php redirects, the browser won't follow via AJAX; handle explicit JSON or text
        // Try parse as JSON
        let handled = false;
        if (typeof response === 'object') {
          if (response.status === 'success' && response.redirect) {
            window.location.href = response.redirect;
            handled = true;
          } else if (response.status === 'error') {
            showError(response.message || 'Login failed.');
            handled = true;
          }
        }
        if (!handled) {
          // If server responded with HTML or plain text, attempt to detect redirect via header
          // Simple heuristic: if response contains "Welcome" assume success, otherwise show it as error
          if (jqXHR.getResponseHeader('X-Login-Success') === '1') {
            // backend could set this header before echoing
            window.location.href = 'student_dashboard.html';
          } else {
            showError(response || 'Login failed.');
          }
        }
      },
      error: function(jqXHR, textStatus, errorThrown) {
        console.error('Login AJAX error:', textStatus, errorThrown, jqXHR.responseText);
        showError('Server error. Try again later.');
      }
    });
  });
ṇ
  function showError(msg) {
    errorBox.text(msg).show();
  }

  // Wire toggle
  $('.toggle-pass').on('click', togglePassword);
</script>
</body>
</html>
